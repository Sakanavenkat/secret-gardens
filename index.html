<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garden Letters</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Shadows+Into+Light&family=Homemade+Apple&family=Work+Sans:wght@400;500;600&display=swap');

:root{
  --sky-top: #FBF3DF;
  --sky-mid: #D9E9F2;
  --sky-bottom: #D7E7CE;
  --kraft: #CBA871;
  --kraft-dark: #AD8A57;
  --kraft-flap: #DCC090;
  --paper: #F8F3E6;
  --ink: #2E2A22;
  --muted: #756E5C;
  --ui-dark: #1C1C1B;
  --card-shadow: rgba(60,45,20,0.18);
  --note-font: 'Caveat', cursive;
}
body.dark{
  --sky-top: #1B2430;
  --sky-mid: #101820;
  --sky-bottom: #131C16;
  --kraft: #4A3D2A;
  --kraft-dark: #362C1D;
  --kraft-flap: #5B4B33;
  --paper: #EDE4D0;
  --ink: #241F16;
  --muted: #A69B85;
  --ui-dark: #F3EFE4;
  --card-shadow: rgba(0,0,0,0.5);
}

/* palette variants */
body.palette-rose{
  --sky-top: #FDF1EC; --sky-mid: #F3DCE6; --sky-bottom: #E9D6E0;
  --kraft: #D9A9A0; --kraft-dark: #BE8981; --kraft-flap: #E8C1BA; --paper: #FBEFE9;
}
body.palette-rose.dark{
  --sky-top: #2A1B22; --sky-mid: #1E1420; --sky-bottom: #1A1620;
  --kraft: #5C3A38; --kraft-dark: #452A28; --kraft-flap: #6E4644; --paper: #EDDCD5;
}
body.palette-meadow{
  --sky-top: #EFF6E8; --sky-mid: #D3E6EF; --sky-bottom: #C7DFCB;
  --kraft: #A6B98C; --kraft-dark: #8AA070; --kraft-flap: #BFCEA0; --paper: #F2F3E4;
}
body.palette-meadow.dark{
  --sky-top: #161F1C; --sky-mid: #101A22; --sky-bottom: #121C16;
  --kraft: #3D4A34; --kraft-dark: #2C3626; --kraft-flap: #4A5A3E; --paper: #E4E8D6;
}

/* note font variants */
body.font-shadows{ --note-font: 'Shadows Into Light', cursive; }
body.font-homemade{ --note-font: 'Homemade Apple', cursive; }

*{ box-sizing:border-box; }
body{
  margin:0;
  min-height:100vh;
  font-family:'Work Sans', sans-serif;
  background: radial-gradient(circle at 8% 5%, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
  color: var(--ui-dark);
  transition: background 0.3s ease, color 0.3s ease;
}

header{
  display:flex;
  align-items:center;
  gap:18px;
  padding: 18px 28px;
  flex-wrap: wrap;
}
.logo{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:'Caveat', cursive;
  font-size: 26px;
  font-weight:700;
  color: var(--ui-dark);
  margin-right: auto;
}
.logo .bud{ font-size:20px; }

.search-box{
  flex: 1 1 240px;
  max-width: 380px;
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 999px;
  padding: 9px 16px;
  font-family:'Work Sans', sans-serif;
  font-size: 13.5px;
  color: var(--ink);
  outline: none;
  transition: box-shadow 0.2s ease, border-color 0.2s ease;
}
.search-box:focus{ box-shadow: 0 0 0 3px rgba(217,164,65,0.28); border-color: var(--kraft-dark); }
body.dark .search-box{ background: rgba(255,255,255,0.06); color: var(--ui-dark); }
.search-box::placeholder{ color: var(--muted); }

.toggle-btn{
  border: none;
  background: rgba(255,255,255,0.6);
  width: 38px; height:38px;
  border-radius: 50%;
  cursor:pointer;
  font-size: 16px;
  display:flex; align-items:center; justify-content:center;
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), background 0.2s ease;
}
.toggle-btn:hover{ transform: rotate(-18deg) scale(1.08); }
body.dark .toggle-btn{ background: rgba(255,255,255,0.1); }

.write-btn{
  background: var(--ui-dark);
  color: var(--sky-top);
  border:none;
  padding: 11px 20px;
  border-radius: 999px;
  font-family:'Work Sans', sans-serif;
  font-weight:600;
  font-size: 13.5px;
  cursor:pointer;
  white-space:nowrap;
  transition: transform 0.16s ease, box-shadow 0.16s ease;
}
.write-btn:hover{ transform: translateY(-2px); box-shadow: 0 8px 18px -8px rgba(0,0,0,0.4); }
.write-btn:active{ transform: translateY(0); }
body.dark .write-btn{ color: #17181B; }

main{
  padding: 34px 28px 90px;
  max-width: 1320px;
  margin: 0 auto;
}
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 90px 26px;
}

.empty-state{
  text-align:center;
  padding: 100px 20px;
  color: var(--muted);
  font-size: 14px;
}
.empty-state .glyph{ font-family:'Caveat', cursive; font-size:34px; display:block; margin-bottom:8px; color: var(--ink); }

@keyframes cardIn{
  from{ opacity:0; transform: translateY(20px) scale(0.96); }
  to{ opacity:1; transform: translateY(0) scale(1); }
}
@keyframes sway{
  0%,100%{ transform: rotate(-1.4deg); }
  50%{ transform: rotate(1.4deg); }
}
@keyframes flapUnroll{
  from{ clip-path: polygon(0 0, 50% 6%, 100% 0, 100% 100%, 0 100%); }
  to{ clip-path: polygon(0 0, 50% 62%, 100% 0, 100% 100%, 0 100%); }
}

/* envelope card */
.card{
  position: relative;
  cursor: pointer;
  padding-top: 96px;
  opacity:0;
  animation: cardIn 0.55s cubic-bezier(.22,.8,.32,1) forwards;
}
.flowers{
  position:absolute;
  top: 0;
  left: 0; right:0;
  height: 152px;
  display:flex;
  justify-content:center;
  z-index: 2;
  pointer-events:none;
}
.flowers svg{
  transform-origin: 50% 92%;
  animation: sway 5s ease-in-out infinite;
}
.envelope{
  position:relative;
  background: var(--kraft);
  border-radius: 6px;
  box-shadow: 0 14px 30px -12px var(--card-shadow);
  overflow: hidden;
  transition: transform 0.22s cubic-bezier(.22,.8,.32,1), box-shadow 0.22s ease;
}
.card:hover .envelope{ transform: translateY(-5px); box-shadow: 0 22px 40px -16px var(--card-shadow); }
.card:hover .flowers svg{ animation-play-state: paused; transform: rotate(0deg) translateY(-3px); transition: transform 0.25s ease; }

.flap{
  position:relative;
  height: 92px;
  background: var(--kraft-flap);
  clip-path: polygon(0 0, 50% 62%, 100% 0, 100% 100%, 0 100%);
  transition: height 0.22s ease;
  animation: flapUnroll 0.5s cubic-bezier(.22,.8,.32,1) both;
}
.note{
  position:absolute;
  top: 14px; left:8%; right:8%;
  background: var(--paper);
  border-radius: 2px;
  padding: 12px 12px 30px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  font-family: var(--note-font);
  font-size: 17px;
  line-height:1.3;
  color: var(--ink);
  max-height: 96px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  transition: transform 0.22s cubic-bezier(.22,.8,.32,1);
}
.card:hover .note{ transform: translateY(-5px) rotate(-0.6deg); }
.note.photo-note{
  padding: 4%;
  display:block;
}
.note.photo-note img{
  width:100%; height: 78px;
  object-fit: cover;
  border-radius: 2px;
  display:block;
  transform: rotate(-1.2deg);
}
.envelope-body{
  padding: 12px 16px 16px;
  font-family: var(--note-font);
  font-size: 16px;
  color: #4a3a20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 8px;
}
body.dark .envelope-body{ color: #E6DCC4; }
.to-line{ opacity: 0.85; }
.seal-badge{ flex-shrink:0; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }

/* modal (compose + view) */
@keyframes modalIn{
  from{ opacity:0; transform: scale(0.94) translateY(10px); }
  to{ opacity:1; transform: scale(1) translateY(0); }
}
.modal-backdrop{
  position: fixed; inset:0;
  background: rgba(10,10,8,0.55);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index: 60;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.22s ease, visibility 0s linear 0.22s;
}
.modal-backdrop.open{
  opacity: 1;
  visibility: visible;
  transition: opacity 0.22s ease;
}
.modal-backdrop.open .modal{ animation: modalIn 0.3s cubic-bezier(.22,.8,.32,1); }
.modal{
  background: var(--paper);
  color: var(--ink);
  width:100%;
  max-width: 460px;
  max-height: 86vh;
  overflow-y:auto;
  border-radius: 6px;
  padding: 26px 24px;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
}
.modal h3{
  font-family:'Caveat', cursive;
  font-size: 24px;
  margin: 0 0 14px;
}
.field-label{
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--muted);
  margin-bottom: 4px;
}
.field-input, .field-textarea{
  width:100%;
  border: 1px solid rgba(0,0,0,0.15);
  background: #FBF7EC;
  color: var(--ink);
  font-family:'Work Sans', sans-serif;
  font-size: 14px;
  padding: 9px 11px;
  border-radius: 4px;
  outline:none;
  margin-bottom: 14px;
}
.field-textarea{
  font-family: var(--note-font);
  font-size: 18px;
  min-height: 140px;
  resize: vertical;
  line-height:1.4;
}
.photo-picker{
  display:flex;
  align-items:center;
  gap: 12px;
  margin-bottom: 14px;
}
.photo-picker label{
  border: 1px dashed rgba(0,0,0,0.3);
  padding: 9px 14px;
  border-radius: 6px;
  font-size: 12.5px;
  cursor:pointer;
  color: var(--muted);
  background: rgba(255,255,255,0.4);
  transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
}
.photo-picker label:hover{ border-color: var(--kraft-dark); color: var(--ink); background: rgba(255,255,255,0.7); }
.photo-picker input[type=file]{ display:none; }
.photo-preview{
  position:relative;
  display:none;
}
.photo-preview.show{ display:block; }
.photo-preview img{
  width: 70px; height:52px;
  object-fit:cover;
  border-radius: 4px;
}
.photo-preview .remove-photo{
  position:absolute;
  top:-6px; right:-6px;
  background:#1C1C1B;
  color:#fff;
  border:none;
  width:18px; height:18px;
  border-radius:50%;
  font-size: 11px;
  line-height:1;
  cursor:pointer;
}

.swatch-row{
  display:flex;
  flex-wrap: wrap;
  gap: 8px;
}
.swatch-btn{
  display:flex;
  align-items:center;
  gap: 7px;
  border: 1.5px solid rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.5);
  padding: 7px 12px;
  border-radius: 999px;
  font-family:'Work Sans', sans-serif;
  font-size: 12.5px;
  color: var(--ink);
  cursor: pointer;
  transition: border-color 0.16s ease, transform 0.16s ease;
}
.swatch-btn:hover{ transform: translateY(-1px); }
.swatch-btn.active{ border-color: var(--kraft-dark); background: rgba(255,255,255,0.85); font-weight:600; }
.swatch-dot{
  width: 16px; height:16px;
  border-radius: 50%;
  display:inline-block;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
}

.modal-actions{
  display:flex;
  gap: 10px;
  justify-content:flex-end;
  margin-top: 6px;
}
.btn-secondary{
  background:none;
  border: 1px solid rgba(0,0,0,0.25);
  padding: 9px 16px;
  border-radius: 999px;
  cursor:pointer;
  font-family:'Work Sans', sans-serif;
  font-size: 13px;
  transition: background 0.16s ease, transform 0.16s ease;
}
.btn-secondary:hover{ background: rgba(0,0,0,0.06); }
.btn-primary{
  background: var(--ui-dark);
  color: var(--sky-top);
  border:none;
  padding: 9px 18px;
  border-radius: 999px;
  cursor:pointer;
  font-family:'Work Sans', sans-serif;
  font-weight:600;
  font-size: 13px;
  transition: transform 0.16s ease, box-shadow 0.16s ease;
}
.btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 8px 16px -8px rgba(0,0,0,0.4); }
.btn-primary:active{ transform: scale(0.97); }

.toast{
  position: fixed;
  left: 50%; bottom: 34px;
  transform: translate(-50%, 14px);
  background: var(--ui-dark);
  color: var(--sky-top);
  padding: 12px 22px;
  border-radius: 999px;
  font-family:'Work Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  box-shadow: 0 16px 30px -10px rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s cubic-bezier(.22,.8,.32,1);
  z-index: 80;
}
body.dark .toast{ color: #17181B; }
.toast.show{ opacity:1; transform: translate(-50%, 0); }
.view-date{ font-size:11.5px; color: var(--muted); margin-bottom: 12px; font-family:'Work Sans',sans-serif; }
.view-image{ width:100%; border-radius: 6px; margin-bottom: 14px; display:block; }
.view-body{ font-family: var(--note-font); font-size: 19px; line-height:1.5; white-space: pre-wrap; margin-bottom: 16px; }
.view-to{ font-family: var(--note-font); font-size: 17px; color: var(--muted); }

/* ---------- auth gate ---------- */
#appScreen{ display:none; }
#authScreen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 24px;
}
.auth-card{
  background: var(--paper);
  color: var(--ink);
  width:100%;
  max-width: 380px;
  border-radius: 8px;
  padding: 34px 30px;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.35);
  text-align:center;
}
.auth-card .bud{ font-size:30px; }
.auth-card h1{
  font-family:'Caveat', cursive;
  font-size: 30px;
  margin: 6px 0 4px;
}
.auth-card p.sub{
  font-family:'Work Sans', sans-serif;
  font-size: 12.5px;
  color: var(--muted);
  margin: 0 0 22px;
}
.auth-card .field-input{ text-align:center; }
.auth-error{
  color: #A6382E;
  font-family:'Work Sans', sans-serif;
  font-size: 12.5px;
  margin: -6px 0 12px;
  min-height: 16px;
}
.auth-card .btn-primary{ width:100%; padding: 11px; font-size:14px; }
.auth-switch{
  margin-top: 16px;
  font-family:'Work Sans', sans-serif;
  font-size: 12px;
  color: var(--muted);
}
.auth-switch button{
  background:none; border:none; text-decoration: underline;
  color: var(--muted); cursor:pointer; font-family:'Work Sans', sans-serif; font-size: 12px;
}
@keyframes authShake{
  0%,100%{ transform: translateX(0); }
  20%,60%{ transform: translateX(-8px); }
  40%,80%{ transform: translateX(8px); }
}
.auth-card.shake{ animation: authShake 0.4s ease; }

/* ---------- garden scene (letter view) ---------- */
.scene-modal{ max-width: 560px; padding: 0; overflow:hidden; }
.scene-stage{
  position:relative;
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-bottom) 100%);
  height: 240px;
  overflow: hidden;
}
.scene-flower{
  position:absolute;
  left:50%; bottom: 10px;
  transform: translateX(-50%) scale(0.2);
  transform-origin: bottom center;
  animation: bloomIn 1.1s cubic-bezier(.22,1.4,.4,1) forwards;
}
@keyframes bloomIn{
  0%{ transform: translateX(-50%) scale(0.15) rotate(-4deg); opacity:0; }
  55%{ opacity:1; }
  70%{ transform: translateX(-50%) scale(1.12) rotate(2deg); }
  100%{ transform: translateX(-50%) scale(1) rotate(0deg); }
}
.critter{
  position:absolute;
  will-change: transform;
}
@keyframes flutter1{
  0%{ transform: translate(20px, 190px) scale(0.7) rotate(0deg); opacity:0; }
  8%{ opacity:1; }
  35%{ transform: translate(230px, 70px) scale(0.85) rotate(8deg); }
  50%{ transform: translate(260px, 90px) scale(0.85) rotate(-6deg); }
  65%{ transform: translate(240px, 75px) scale(0.85) rotate(6deg); }
  92%{ opacity:1; }
  100%{ transform: translate(480px, -30px) scale(0.7) rotate(-4deg); opacity:0; }
}
@keyframes flutter2{
  0%{ transform: translate(520px, 40px) scale(0.6) rotate(0deg); opacity:0; }
  10%{ opacity:1; }
  45%{ transform: translate(300px, 100px) scale(0.75) rotate(-10deg); }
  60%{ transform: translate(280px, 115px) scale(0.75) rotate(8deg); }
  90%{ opacity:1; }
  100%{ transform: translate(60px, -20px) scale(0.6) rotate(6deg); opacity:0; }
}
@keyframes birdCross{
  0%{ transform: translate(-40px, 30px) scale(0.9); opacity:0; }
  10%{ opacity:0.85; }
  90%{ opacity:0.85; }
  100%{ transform: translate(600px, 10px) scale(0.9); opacity:0; }
}
.wing{ animation: wingFlap 0.35s ease-in-out infinite alternate; transform-origin: 0px 0px; }
@keyframes wingFlap{ from{ transform: scaleX(1); } to{ transform: scaleX(0.35); } }

.scene-letter{ padding: 22px 24px 24px; }
.scene-video{
  margin-bottom: 14px;
  border-radius: 6px;
  overflow: hidden;
  aspect-ratio: 16/9;
  background: #000;
}
.scene-video iframe{ width:100%; height:100%; border:0; display:block; }
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-card" id="authCard">
    <span class="bud">✿</span>
    <h1 id="authTitle">Welcome back</h1>
    <p class="sub" id="authSub">Enter your name and password to open your garden</p>
    <input class="field-input" id="authName" placeholder="Your name">
    <input class="field-input" id="authPass" type="password" placeholder="Password">
    <input class="field-input" id="authPass2" type="password" placeholder="Confirm password" style="display:none">
    <div class="auth-error" id="authError"></div>
    <button class="btn-primary" id="authSubmit">Enter my garden</button>
    <div class="auth-switch" id="authSwitch"></div>
  </div>
</div>

<div id="appScreen">
<header>
  <div class="logo"><span class="bud">✿</span> GardenLetters</div>
  <input class="search-box" id="searchBox" placeholder="Search letters…">
  <button class="toggle-btn" id="prefsBtn" title="Preferences">⚙</button>
  <button class="toggle-btn" id="themeToggle" title="Toggle theme">☾</button>
  <button class="toggle-btn" id="lockBtn" title="Lock garden">🔒</button>
  <button class="write-btn" id="writeBtn">+ Write a letter</button>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>
</div>

<div class="modal-backdrop" id="prefsBackdrop">
  <div class="modal">
    <h3>Preferences</h3>

    <div class="field-label">Palette</div>
    <div class="swatch-row" id="paletteRow">
      <button class="swatch-btn" data-value="warm">
        <span class="swatch-dot" style="background:linear-gradient(135deg,#CBA871,#F8F3E6)"></span> Warm Kraft
      </button>
      <button class="swatch-btn" data-value="rose">
        <span class="swatch-dot" style="background:linear-gradient(135deg,#D9A9A0,#FBEFE9)"></span> Rose Garden
      </button>
      <button class="swatch-btn" data-value="meadow">
        <span class="swatch-dot" style="background:linear-gradient(135deg,#A6B98C,#F2F3E4)"></span> Meadow Blue
      </button>
    </div>

    <div class="field-label" style="margin-top:16px;">Letter handwriting</div>
    <div class="swatch-row" id="fontRow">
      <button class="swatch-btn" data-value="caveat" style="font-family:'Caveat',cursive; font-size:15px;">Caveat</button>
      <button class="swatch-btn" data-value="shadows" style="font-family:'Shadows Into Light',cursive; font-size:14px;">Shadows Into Light</button>
      <button class="swatch-btn" data-value="homemade" style="font-family:'Homemade Apple',cursive; font-size:13px;">Homemade Apple</button>
    </div>

    <div class="field-label" style="margin-top:16px;">Bouquet style</div>
    <div class="swatch-row" id="bouquetRow">
      <button class="swatch-btn" data-value="lush">Lush &amp; full</button>
      <button class="swatch-btn" data-value="wildflower">Wildflower mix</button>
      <button class="swatch-btn" data-value="minimal">Minimal</button>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" id="prefsCloseBtn">Done</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="composeBackdrop">
  <div class="modal">
    <h3>Write a letter</h3>
    <div class="field-label">To</div>
    <input class="field-input" id="toInput" placeholder="myself, future me, a friend…">
    <div class="field-label">Your letter</div>
    <textarea class="field-textarea" id="bodyInput" placeholder="Dear..."></textarea>
    <div class="field-label">Photo (optional)</div>
    <div class="photo-picker">
      <label for="photoInput">+ Add a photo</label>
      <input type="file" id="photoInput" accept="image/*">
      <div class="photo-preview" id="photoPreview">
        <img id="photoPreviewImg">
        <button class="remove-photo" id="removePhoto">✕</button>
      </div>
    </div>
    <div class="field-label">Video (optional)</div>
    <div class="photo-picker">
      <label for="videoFileInput">+ Add a video clip (under 4MB only)</label>
      <input type="file" id="videoFileInput" accept="video/*">
    </div>
    <div class="photo-preview" id="videoPreview" style="margin-bottom:10px;">
      <span style="font-size:12px; color:var(--muted);">🎬 <span id="videoFileName"></span></span>
      <button class="remove-photo" id="removeVideoFile">✕</button>
    </div>
    <div id="videoWarningBox" style="display:none; background:rgba(166,56,46,0.12); border:1px solid rgba(166,56,46,0.4); border-radius:6px; padding:10px 12px; margin:-6px 0 14px; font-size:12.5px; color:#A6382E; font-family:'Work Sans',sans-serif; line-height:1.4;"></div>
    <div class="field-label">…or paste a video link instead (works for any length)</div>
    <input class="field-input" id="videoInput" placeholder="YouTube or Google Drive link…">
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="sealBtn">Seal &amp; plant</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">🌱 Letter planted in your garden</div>

<div class="modal-backdrop" id="viewBackdrop">
  <div class="modal scene-modal">
    <div class="scene-stage" id="sceneStage"></div>
    <div class="scene-letter">
      <div class="view-date" id="viewDate"></div>
      <div class="scene-video" id="sceneVideo" style="display:none"></div>
      <img class="view-image" id="viewImage" style="display:none">
      <div class="view-body" id="viewBody"></div>
      <div class="view-to" id="viewTo"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="viewCloseBtn">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'garden-letters:v3:entries';
const PREFS_KEY = 'garden-letters:prefs';
const AUTH_KEY = 'garden-letters:auth';
let entries = [];
let pendingImage = null;
let pendingVideoFile = null; // {data, type, name}
let prefs = { palette: 'warm', font: 'caveat', bouquet: 'lush', dark: false };
let authRecord = null; // {name, password} once loaded
let authMode = 'login'; // 'login' | 'setup'

const el = id => document.getElementById(id);
const grid = el('grid');

function applyPrefsToDOM(){
  document.body.classList.toggle('dark', prefs.dark);
  document.body.classList.toggle('palette-rose', prefs.palette === 'rose');
  document.body.classList.toggle('palette-meadow', prefs.palette === 'meadow');
  document.body.classList.toggle('font-shadows', prefs.font === 'shadows');
  document.body.classList.toggle('font-homemade', prefs.font === 'homemade');
  el('themeToggle').textContent = prefs.dark ? '☀' : '☾';

  ['paletteRow','fontRow','bouquetRow'].forEach(rowId => {
    const key = rowId === 'paletteRow' ? 'palette' : rowId === 'fontRow' ? 'font' : 'bouquet';
    el(rowId).querySelectorAll('.swatch-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.value === prefs[key]);
    });
  });
}

async function loadPrefs(){
  try{
    const res = await window.storage.get(PREFS_KEY, false);
    if(res && res.value) prefs = { ...prefs, ...JSON.parse(res.value) };
  }catch(e){ /* no saved prefs yet */ }
  applyPrefsToDOM();
}

async function savePrefs(){
  try{ await window.storage.set(PREFS_KEY, JSON.stringify(prefs), false); }
  catch(e){ console.error('Could not save preferences:', e); }
}

/* ---------- auth gate ----------
   Note: this is a simple client-side lock for your own peace of mind while
   using the app — not real security. Anyone with access to this browser's
   storage or the page source could bypass it. Your letters are already
   private to your account via the app's storage system either way. */

async function loadAuth(){
  try{
    const res = await window.storage.get(AUTH_KEY, false);
    authRecord = res && res.value ? JSON.parse(res.value) : null;
  }catch(e){
    authRecord = null;
  }
  authMode = authRecord ? 'login' : 'setup';
  renderAuthScreen();
}

function renderAuthScreen(){
  if(authMode === 'setup'){
    el('authTitle').textContent = 'Create your garden';
    el('authSub').textContent = 'Set a name and password to keep your letters private';
    el('authPass2').style.display = 'block';
    el('authSubmit').textContent = 'Create my garden';
    el('authSwitch').innerHTML = authRecord ? `<button id="authSwitchBtn">Back to login</button>` : '';
  }else{
    el('authTitle').textContent = 'Welcome back';
    el('authSub').textContent = 'Enter your name and password to open your garden';
    el('authPass2').style.display = 'none';
    el('authSubmit').textContent = 'Enter my garden';
    el('authSwitch').innerHTML = `<button id="authSwitchBtn">Set up a different name/password</button>`;
  }
  el('authError').textContent = '';
  const switchBtn = document.getElementById('authSwitchBtn');
  if(switchBtn){
    switchBtn.addEventListener('click', () => {
      authMode = authMode === 'setup' ? 'login' : 'setup';
      renderAuthScreen();
    });
  }
}

function authFail(msg){
  el('authError').textContent = msg;
  const card = el('authCard');
  card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
}

async function unlockApp(){
  el('authScreen').style.display = 'none';
  el('appScreen').style.display = 'block';
  await loadPrefs();
  await loadEntries();
}

el('authSubmit').addEventListener('click', async () => {
  const name = el('authName').value.trim();
  const pass = el('authPass').value;
  if(!name || !pass){ authFail('Please fill in both fields.'); return; }

  if(authMode === 'setup'){
    const pass2 = el('authPass2').value;
    if(pass !== pass2){ authFail('Passwords don\u2019t match.'); return; }
    authRecord = { name, password: pass };
    try{ await window.storage.set(AUTH_KEY, JSON.stringify(authRecord), false); }
    catch(e){ authFail('Could not save. Try again.'); return; }
    unlockApp();
  }else{
    if(!authRecord || name !== authRecord.name || pass !== authRecord.password){
      authFail('Name or password doesn\u2019t match.');
      return;
    }
    unlockApp();
  }
});

el('lockBtn').addEventListener('click', () => {
  el('appScreen').style.display = 'none';
  el('authScreen').style.display = 'flex';
  el('authName').value = ''; el('authPass').value = ''; el('authPass2').value = '';
  authMode = 'login';
  renderAuthScreen();
});


/* ---------- flower illustration engine ---------- */

function petalPath(len, width, curve){
  // pointed lance/almond petal, tip up, base at origin
  return `M0,0 C ${-width},${-len*0.18} ${-width*0.62},${-len*(0.78+curve)} 0,${-len} ` +
         `C ${width*0.62},${-len*(0.78+curve)} ${width},${-len*0.18} 0,0 Z`;
}

function irisHead(cx, cy, opts){
  // layered iris: 3 upright "standards" + 3 drooping "falls" with a beard mark, like the reference
  const { petalLen, petalWidth, fallColor, fallTip, standardColor, standardTip, beard, rot } = opts;
  const gid = 'g' + Math.random().toString(36).slice(2,8);
  let g = `<g transform="translate(${cx},${cy}) rotate(${rot||0})">
    <defs>
      <linearGradient id="${gid}f" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="${fallColor}"/><stop offset="100%" stop-color="${fallTip}"/>
      </linearGradient>
      <linearGradient id="${gid}s" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="${standardColor}"/><stop offset="100%" stop-color="${standardTip}"/>
      </linearGradient>
    </defs>`;
  // 3 falls (droop outward/down)
  [-56,0,56].forEach(a => {
    g += `<g transform="rotate(${a+180})"><path d="${petalPath(petalLen, petalWidth, 0.28)}" fill="url(#${gid}f)"/></g>`;
  });
  // beard marks
  [-56,0,56].forEach(a => {
    const rad = (a+180)*Math.PI/180;
    const bx = Math.sin(rad)*petalLen*0.55, by = -Math.cos(rad)*petalLen*0.55;
    g += `<ellipse cx="${bx}" cy="${by}" rx="3" ry="6" fill="${beard}" transform="rotate(${a+180} ${bx} ${by})" opacity="0.9"/>`;
  });
  // 3 standards (upright, smaller)
  [-24,0,24].forEach(a => {
    g += `<g transform="rotate(${a})"><path d="${petalPath(petalLen*0.62, petalWidth*0.72, 0.02)}" fill="url(#${gid}s)"/></g>`;
  });
  g += `</g>`;
  return g;
}

function simpleHead(cx, cy, opts){
  const { petalCount, petalLen, petalWidth, spreadDeg, curve, fill, fillTip, centerFill, rot } = opts;
  const gid = 'g' + Math.random().toString(36).slice(2,8);
  let g = `<g transform="translate(${cx},${cy}) rotate(${rot||0})">
    <defs><linearGradient id="${gid}" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="${fill}"/><stop offset="100%" stop-color="${fillTip}"/>
    </linearGradient></defs>`;
  for(let i=0;i<petalCount;i++){
    const angle = -spreadDeg/2 + (spreadDeg/(petalCount-1||1))*i;
    g += `<g transform="rotate(${angle})"><path d="${petalPath(petalLen, petalWidth, curve)}" fill="url(#${gid})" opacity="0.96"/></g>`;
  }
  g += `<circle cx="0" cy="0" r="${petalWidth*0.42}" fill="${centerFill}"/></g>`;
  return g;
}

const SPECIES = [
  // yellow iris
  (cx,cy,seed) => irisHead(cx,cy,{ petalLen: 30, petalWidth: 13,
    fallColor:'#E0A420', fallTip:'#F6DE7E', standardColor:'#F2C230', standardTip:'#FBEBAF',
    beard:'#C97A1E', rot: (seed%30)-15 }),
  // deep maroon iris
  (cx,cy,seed) => irisHead(cx,cy,{ petalLen: 30, petalWidth: 13,
    fallColor:'#6E2A1E', fallTip:'#9C4A32', standardColor:'#8A3524', standardTip:'#C9714E',
    beard:'#F2C230', rot: (seed%30)-15 }),
  // orange-red iris
  (cx,cy,seed) => irisHead(cx,cy,{ petalLen: 30, petalWidth: 13,
    fallColor:'#B84420', fallTip:'#E8823D', standardColor:'#C9541E', standardTip:'#F0A05C',
    beard:'#F2C230', rot: (seed%30)-15 }),
  // peach/blush iris
  (cx,cy,seed) => irisHead(cx,cy,{ petalLen: 28, petalWidth: 12,
    fallColor:'#D89A78', fallTip:'#F0D6BE', standardColor:'#E0B292', standardTip:'#F7E6D4',
    beard:'#C97A1E', rot: (seed%30)-15 }),
  // small blue star accent flower
  (cx,cy,seed) => simpleHead(cx,cy,{ petalCount: 6, petalLen: 15, petalWidth: 6, spreadDeg: 360, curve: 0.05,
    fill:'#3F5FA0', fillTip:'#8CA9DD', centerFill:'#F2C230', rot: seed%360 }),
];

const WAX_COLORS = ['#7A1F2B','#2E4A3A','#2A3568','#5C3A22','#B84420'];
function sealBadgeSvg(id){
  const seed = seedFromId(id);
  const color = WAX_COLORS[seed % WAX_COLORS.length];
  let bumps = '';
  for(let i=0;i<12;i++){
    const a = (i/12) * Math.PI*2;
    bumps += `<circle cx="${Math.cos(a)*13}" cy="${Math.sin(a)*13}" r="1.8" fill="${color}"/>`;
  }
  return `<svg class="seal-badge" width="30" height="30" viewBox="-15 -15 30 30">
    ${bumps}
    <circle cx="0" cy="0" r="11.5" fill="${color}"/>
    <path d="M0,-6 L1.6,-2.2 L6,-2.1 L2.6,1 L4,5.6 L0,2.8 L-4,5.6 L-2.6,1 L-6,-2.1 L-1.6,-2.2 Z" fill="#F2E6BE" opacity="0.9"/>
  </svg>`;
}

function leafBlade(x, y, len, angleDeg, width){
  const w = width || 5;
  return `<g transform="translate(${x},${y}) rotate(${angleDeg})">
    <path d="M0,0 Q${w},${-len*0.55} 0,${-len} Q${-w},${-len*0.55} 0,0 Z" fill="#4C7A56" opacity="0.9"/>
  </g>`;
}

function seedFromId(id){
  let h = 0;
  for(let i=0;i<id.length;i++){ h = (h*31 + id.charCodeAt(i)) >>> 0; }
  return h;
}

function bouquetSvg(id, style){
  style = style || 'lush';
  const seed = seedFromId(id);
  const w = 210, h = 150, baseY = h - 4;

  const stemCount = style === 'minimal' ? 2 + (seed % 2)
                   : style === 'wildflower' ? 3 + (seed % 2)
                   : 5 + (seed % 2); // lush
  const fixedSpecies = style === 'minimal' ? seed % (SPECIES.length - 1) : null; // exclude star-flower for a cleaner minimal look

  let stems = '', leaves = '', heads = [];

  for(let i=0;i<stemCount;i++){
    const t = stemCount === 1 ? 0.5 : i/(stemCount-1);
    const cx = 26 + t * (w-52);
    const jitter = ((seed >>> (i*4)) % 16) - 8;
    const stemH = (style === 'minimal' ? 46 : 62) + ((seed >>> (i*3)) % 32);
    const topY = baseY - stemH;
    const bendX = cx + jitter*0.5;

    stems += `<path d="M${cx},${baseY} Q${bendX},${(baseY+topY)/2} ${bendX},${topY+6}" stroke="#3E6B48" stroke-width="3" fill="none"/>`;
    leaves += leafBlade(cx, baseY - stemH*0.3, 34, jitter >= 0 ? 32 : -32, 6);
    if(i % 2 === 0) leaves += leafBlade(cx, baseY - stemH*0.55, 26, jitter >= 0 ? -42 : 42, 5);

    let speciesIdx;
    if(style === 'minimal') speciesIdx = fixedSpecies;
    else if(style === 'wildflower') speciesIdx = ((seed >>> (i*5)) % 10) < 6 ? 4 : (seed >>> (i*3)) % 4;
    else speciesIdx = (seed >>> (i*5)) % SPECIES.length;

    heads.push({ y: topY, svg: SPECIES[speciesIdx](bendX, topY, seed >>> (i*2)) });
  }
  heads.sort((a,b) => a.y - b.y);
  const headsSvg = heads.map(hh => hh.svg).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${stems}${leaves}${headsSvg}</svg>`;
}

/* ---------- data + rendering ---------- */

function videoEmbedUrl(url){
  if(!url) return null;
  try{
    const yt = url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=|youtube\.com\/embed\/)([\w-]{6,})/);
    if(yt) return `https://www.youtube.com/embed/${yt[1]}`;
    const drive = url.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
    if(drive) return `https://drive.google.com/file/d/${drive[1]}/preview`;
    return url; // fall back to trying the raw URL in an iframe
  }catch(e){
    return null;
  }
}

function butterflySvg(color){
  return `<svg width="34" height="26" viewBox="-17 -13 34 26">
    <g class="wing">
      <path d="M0,0 C-4,-13 -18,-11 -16,-2 C-15,4 -6,4 0,0 Z" fill="${color}" opacity="0.92"/>
      <path d="M0,0 C-4,12 -16,10 -14,3 C-13,-2 -5,-3 0,0 Z" fill="${color}" opacity="0.75"/>
    </g>
    <g class="wing" transform="scale(-1,1)">
      <path d="M0,0 C-4,-13 -18,-11 -16,-2 C-15,4 -6,4 0,0 Z" fill="${color}" opacity="0.92"/>
      <path d="M0,0 C-4,12 -16,10 -14,3 C-13,-2 -5,-3 0,0 Z" fill="${color}" opacity="0.75"/>
    </g>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#2A2A22" stroke-width="1.6"/>
  </svg>`;
}

function birdSvg(){
  return `<svg width="30" height="18" viewBox="-15 -9 30 18">
    <path d="M-14,0 Q-6,-8 0,0 Q6,-8 14,0 Q6,-2 0,2 Q-6,-2 -14,0 Z" fill="#2E2A22" opacity="0.7"/>
  </svg>`;
}

function buildScene(entry){
  const seed = seedFromId(entry.id);
  const stage = el('sceneStage');
  const butterflyColors = ['#E08FA0','#7B8FD1','#F2C230','#D2691E'];
  const c1 = butterflyColors[seed % butterflyColors.length];
  const c2 = butterflyColors[(seed >>> 4) % butterflyColors.length];

  stage.innerHTML = `
    <div class="scene-flower">${bouquetSvg(entry.id, prefs.bouquet)}</div>
    <div class="critter" style="animation: flutter1 7s ease-in-out infinite;">${butterflySvg(c1)}</div>
    <div class="critter" style="animation: flutter2 8.5s ease-in-out infinite 1.2s;">${butterflySvg(c2)}</div>
    <div class="critter" style="animation: birdCross 11s linear infinite 2.5s;">${birdSvg()}</div>
  `;
}

function fmtDate(iso){
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

async function loadEntries(){
  grid.innerHTML = '<div class="empty-state">Loading your letters…</div>';
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    entries = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    entries = [];
  }
  render();
}

async function saveEntries(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(entries), false);
  }catch(e){
    console.error('Could not save letters:', e);
  }
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render(filter){
  const q = (filter || '').trim().toLowerCase();
  const list = [...entries].reverse().filter(e =>
    !q || e.text.toLowerCase().includes(q) || (e.to||'').toLowerCase().includes(q)
  );

  if(entries.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="glyph">✿</span>Your garden is empty.<br>Write your first letter to plant something.</div>`;
    return;
  }
  if(list.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">No letters match "${filter}".</div>`;
    return;
  }

  grid.innerHTML = list.map(entry => `
    <div class="card" data-id="${entry.id}">
      <div class="flowers">${bouquetSvg(entry.id, prefs.bouquet)}</div>
      <div class="envelope">
        <div class="flap">
          ${ entry.image
            ? `<div class="note photo-note"><img src="${entry.image}" alt=""></div>`
            : `<div class="note">${escapeHtml(entry.text)}</div>` }
        </div>
        <div class="envelope-body">
          <div class="to-line">To: ${escapeHtml(entry.to || 'myself')}</div>
          ${sealBadgeSvg(entry.id)}
        </div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach((card, i) => {
    card.style.animationDelay = Math.min(i * 45, 400) + 'ms';
    const svg = card.querySelector('.flowers svg');
    if(svg){
      const seed = seedFromId(card.dataset.id);
      svg.style.animationDuration = (4.2 + (seed % 30)/10) + 's';
      svg.style.animationDelay = (-(seed % 40)/10) + 's';
    }
    card.addEventListener('click', () => {
      const entry = entries.find(x => x.id === card.dataset.id);
      if(entry) openView(entry);
    });
  });
}

async function openView(entry){
  el('viewDate').textContent = fmtDate(entry.date);
  buildScene(entry);

  const img = el('viewImage');
  if(entry.image){ img.src = entry.image; img.style.display = 'block'; }
  else{ img.style.display = 'none'; }

  const videoBox = el('sceneVideo');
  videoBox.innerHTML = '';
  videoBox.style.display = 'none';

  if(entry.hasVideoFile){
    videoBox.innerHTML = '<div style="color:#fff;font-size:12px;padding:10px;">Loading clip…</div>';
    videoBox.style.display = 'block';
    try{
      const res = await window.storage.get('garden-letters:video:' + entry.id, false);
      if(res && res.value){
        const vid = JSON.parse(res.value);
        videoBox.innerHTML = `<video controls src="${vid.data}" style="width:100%;height:100%;object-fit:contain;background:#000;"></video>`;
      }else{
        videoBox.innerHTML = '<div style="color:#fff;font-size:12px;padding:10px;">Clip not found.</div>';
      }
    }catch(e){
      videoBox.innerHTML = '<div style="color:#fff;font-size:12px;padding:10px;">Could not load this clip.</div>';
    }
  }else if(entry.videoUrl){
    const embed = videoEmbedUrl(entry.videoUrl);
    videoBox.style.display = 'block';
    videoBox.innerHTML = `<iframe src="${embed}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <div style="text-align:center;padding:4px 0;"><a href="${entry.videoUrl}" target="_blank" rel="noopener" style="font-size:11px;color:var(--muted);">Open video in a new tab ↗</a></div>`;
  }

  el('viewBody').textContent = entry.text;
  el('viewTo').textContent = 'To: ' + (entry.to || 'myself');
  el('viewBackdrop').classList.add('open');
}
el('viewCloseBtn').addEventListener('click', () => el('viewBackdrop').classList.remove('open'));
el('viewBackdrop').addEventListener('click', ev => { if(ev.target === el('viewBackdrop')) el('viewBackdrop').classList.remove('open'); });

/* ---------- compose + photo handling ---------- */

el('writeBtn').addEventListener('click', () => {
  el('toInput').value = '';
  el('bodyInput').value = '';
  el('photoInput').value = '';
  el('videoInput').value = '';
  el('videoFileInput').value = '';
  el('videoWarningBox').style.display = 'none';
  pendingImage = null;
  pendingVideoFile = null;
  el('photoPreview').classList.remove('show');
  el('videoPreview').classList.remove('show');
  el('composeBackdrop').classList.add('open');
});
el('cancelBtn').addEventListener('click', () => el('composeBackdrop').classList.remove('open'));
el('composeBackdrop').addEventListener('click', ev => { if(ev.target === el('composeBackdrop')) el('composeBackdrop').classList.remove('open'); });

el('photoInput').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxDim = 640;
      let w = img.width, h = img.height;
      if(w > h && w > maxDim){ h = h * maxDim / w; w = maxDim; }
      else if(h > maxDim){ w = w * maxDim / h; h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      pendingImage = canvas.toDataURL('image/jpeg', 0.72);
      el('photoPreviewImg').src = pendingImage;
      el('photoPreview').classList.add('show');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});
el('removePhoto').addEventListener('click', () => {
  pendingImage = null;
  el('photoInput').value = '';
  el('photoPreview').classList.remove('show');
});

const MAX_VIDEO_BYTES = 4 * 1024 * 1024; // ~4MB — this storage system can't hold full video files
el('videoFileInput').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  el('videoWarningBox').style.display = 'none';
  el('videoPreview').classList.remove('show');
  if(!file) return;

  const sizeMB = (file.size/1024/1024).toFixed(1);
  if(file.size > MAX_VIDEO_BYTES){
    const box = el('videoWarningBox');
    box.style.display = 'block';
    box.textContent = `"${file.name}" is ${sizeMB}MB — that's too big for this app to store directly (limit is 4MB). Use the link field below instead: upload the video to YouTube or Google Drive, then paste the link there.`;
    el('videoFileInput').value = '';
    pendingVideoFile = null;
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingVideoFile = { data: e.target.result, type: file.type, name: file.name };
    el('videoFileName').textContent = `${file.name} (${sizeMB}MB) — ready to plant`;
    el('videoPreview').classList.add('show');
  };
  reader.onerror = () => {
    const box = el('videoWarningBox');
    box.style.display = 'block';
    box.textContent = 'Could not read that file — try a different clip, or use the link field instead.';
  };
  reader.readAsDataURL(file);
});
el('removeVideoFile').addEventListener('click', () => {
  pendingVideoFile = null;
  el('videoFileInput').value = '';
  el('videoPreview').classList.remove('show');
  el('videoWarningBox').style.display = 'none';
});

el('sealBtn').addEventListener('click', async () => {
  const text = el('bodyInput').value.trim();
  if(!text && !pendingImage && !pendingVideoFile) return;
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const entry = {
    id,
    to: el('toInput').value.trim(),
    text: text || ' ',
    image: pendingImage,
    videoUrl: el('videoInput').value.trim() || null,
    hasVideoFile: !!pendingVideoFile,
    date: new Date().toISOString(),
  };
  if(pendingVideoFile){
    try{
      await window.storage.set('garden-letters:video:' + id, JSON.stringify(pendingVideoFile), false);
    }catch(e){
      console.error('Could not save video clip:', e);
      entry.hasVideoFile = false;
    }
  }
  entries.push(entry);
  saveEntries();
  el('composeBackdrop').classList.remove('open');
  render(el('searchBox').value);
  showToast('🌱 Letter planted in your garden');
});

function showToast(msg){
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

el('searchBox').addEventListener('input', (ev) => render(ev.target.value));

el('themeToggle').addEventListener('click', () => {
  prefs.dark = !prefs.dark;
  applyPrefsToDOM();
  savePrefs();
});

el('prefsBtn').addEventListener('click', () => el('prefsBackdrop').classList.add('open'));
el('prefsCloseBtn').addEventListener('click', () => el('prefsBackdrop').classList.remove('open'));
el('prefsBackdrop').addEventListener('click', ev => { if(ev.target === el('prefsBackdrop')) el('prefsBackdrop').classList.remove('open'); });

[['paletteRow','palette'], ['fontRow','font'], ['bouquetRow','bouquet']].forEach(([rowId, key]) => {
  el(rowId).querySelectorAll('.swatch-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      prefs[key] = btn.dataset.value;
      applyPrefsToDOM();
      savePrefs();
      if(key === 'bouquet') render(el('searchBox').value);
    });
  });
});

(async function init(){
  await loadAuth();
})();
</script>
</body>
</html>
